<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f9fafb; }
    .card { background: white; padding: 32px; border-radius: 16px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h2 { font-size: 20px; margin-bottom: 8px; }
    .info { color: #666; margin: 8px 0; font-size: 14px; }
    .status { color: #7c3aed; font-weight: 600; margin: 16px 0; font-size: 15px; min-height: 24px; }
    .error { color: #ef4444; }
    .success { color: #059669; }
  </style>
</head>
<body>
  <div class="card">
    <h2>📞 Phone Tree Scout</h2>
    <div class="info" id="company"></div>
    <div class="info" id="phone"></div>
    <div class="status" id="status">Starting call...</div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const phone = params.get('phone');
    const companyId = params.get('companyId');
    const companyName = params.get('companyName');

    document.getElementById('company').textContent = 'Company: ' + (companyName || 'Unknown');
    document.getElementById('phone').textContent = 'Phone: ' + (phone || 'None');

    const statusEl = document.getElementById('status');

    if (!phone) {
      statusEl.className = 'status error';
      statusEl.textContent = 'No phone number provided.';
    } else {
      fetch('/twilio/call', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ toNumber: phone, companyId: companyId, companyName: companyName })
      })
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          statusEl.className = 'status error';
          statusEl.textContent = 'Error: ' + data.error;
        } else {
          statusEl.className = 'status success';
          statusEl.innerHTML = '✅ Call started!<br>A structured note will appear on the company record in ~2 minutes.<br>You can close this window.';
        }
      })
      .catch(err => {
        statusEl.className = 'status error';
        statusEl.textContent = 'Connection error: ' + err.message;
      });
    }
  </script>
</body>
</html>
